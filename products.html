    <script>
        function viewProduct(product) {
            window.location.href = `product-detail.html?product=${encodeURIComponent(product)}`;
        }

        // Filter products based on category
        function filterCategory(category) {
            const products = document.querySelectorAll('.product');
            products.forEach(product => {
                // If the selected category is 'all', show all products
                if (category === 'all') {
                    product.style.display = 'block';
                } 
                // If the product category matches the selected category, show it
                else if (product.getAttribute('data-category') === category) {
                    product.style.display = 'block';
                } 
                // Otherwise, hide the product
                else {
                    product.style.display = 'none';
                }
            });
        }
    </script>
    <script>

        function searchProducts(){
        
        let input = document.getElementById("search").value.toLowerCase();
        let products = document.querySelectorAll(".product");
        
        products.forEach(product => {
        
        let name = product.getAttribute("data-name").toLowerCase();
        
        if(name.includes(input)){
        product.style.display = "block";
        }
        else{
        product.style.display = "none";
        }
        
        });
        
        }
        
        </script>
